<!DOCTYPE html>
<html lang="ar">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quran Animation</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/all.css">
        
    </head>
    <body>

        <div class="parent">

            <div class="card">
                <div class="dot dotLeft"></div>
                <span class="text-en">Indeed, Allah is with the patient.</span>
                <div class="movingBox boxLTR"></div>
            </div>

            <div class="card card2">
                <div class="dot dotRight"></div>
                <div class="text-ar">إِنَّ اللَّهَ مَعَ الصَّابِرِينَ</div>
                <div class="movingBox boxRTL"></div>
            </div>

            <div class="card card3">
                <div class="dot dotLeft"></div>
                <span class="text-en">And Allah is the Best of Providers.</span>
                <div class="movingBox boxLTR"></div>
            </div>

            <div class="card card4">
                <div class="dot dotRight"></div>
                <div class="text-ar">وَقُل رَّبِّ زِدْنِي عِلْمًا</div>
                <div class="movingBox boxRTL"></div>
            </div>

            <div class="card card5">
                <div class="dot dotLeft"></div>
                <span class="text-en">And He is the Most Merciful.</span>
                <div class="movingBox boxLTR"></div>
            </div>

            <div class="card card6">
                <div class="dot dotRight"></div>
                <div class="text-ar">فَاذْكُرُونِي أَذْكُرْكُمْ</div>
                <div class="movingBox boxRTL"></div>
            </div>

        </div>

    </body>
</html>
